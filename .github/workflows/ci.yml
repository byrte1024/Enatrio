name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make cmake git \
            libgl1-mesa-dev libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libxext-dev libwayland-dev \
            libxkbcommon-dev

      - name: Build raylib from source
        run: |
          git clone --depth 1 --branch 5.5 https://github.com/raysan5/raylib.git /tmp/raylib-src
          cd /tmp/raylib-src/src
          make PLATFORM=PLATFORM_DESKTOP -j$(nproc)
          mkdir -p $GITHUB_WORKSPACE/lib/raylib/lib
          cp libraylib.a $GITHUB_WORKSPACE/lib/raylib/lib/libraylib.a

      - name: Build app (debug)
        run: bash ./build.sh debug

      - name: Build tests
        run: bash ./build.sh tests

      - name: Run tests
        run: |
          OUTPUT=$(./build/tests/Enatrio 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "FAIL"; then
            echo "::error::Tests failed"
            exit 1
          fi
          if ! echo "$OUTPUT" | grep -qE "Results: ([0-9]+)/\1 passed"; then
            PASSED=$(echo "$OUTPUT" | grep -oP 'Results: \K[0-9]+(?=/)')
            TOTAL=$(echo "$OUTPUT" | grep -oP 'Results: [0-9]+/\K[0-9]+')
            if [ "$PASSED" != "$TOTAL" ]; then
              echo "::error::Not all tests passed ($PASSED/$TOTAL)"
              exit 1
            fi
          fi
